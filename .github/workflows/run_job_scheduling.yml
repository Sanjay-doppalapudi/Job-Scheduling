name: Run Job Scheduling Algorithm

on:
  workflow_dispatch:
    inputs:
      job_input:
        description: 'Custom job input data (optional). Format: First line is number of jobs, followed by lines with "release_time processing_time"'
        required: false
        default: ''

jobs:
  run-srpt-algorithm:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib
      
      - name: Run Job Scheduling Algorithm
        run: |
          if [ -n "${{ github.event.inputs.job_input }}" ]; then
            echo "${{ github.event.inputs.job_input }}" | python job_scheduling.py
          else
            # Default sample input: 4 jobs
            # Job 1: release=0, processing=5
            # Job 2: release=1, processing=3
            # Job 3: release=2, processing=1
            # Job 4: release=4, processing=4
            echo "4
            0 5
            1 3
            2 1
            4 4" | python job_scheduling.py
          fi
      
      - name: Upload Gantt Chart
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gantt-chart
          path: gantt_chart.png
          if-no-files-found: ignore
